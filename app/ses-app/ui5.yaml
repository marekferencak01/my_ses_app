specVersion: "3.0"
metadata:
  name: ses.app
type: application
framework:
  name: SAPUI5
  version: "1.120.0"
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.fe.templates
    - name: sap.fe.macros
    - name: sap.ui.fl
    - name: sap.ui.layout
    - name: sap.ui.unified
server:
  customMiddleware:
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ui5:
          - path: /resources
            url: https://sapui5.hana.ondemand.com
            version: "1.120.0"
        backend:
          - path: /ses
            url: http://localhost:4004